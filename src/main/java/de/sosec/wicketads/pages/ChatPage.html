<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>WicketAds – Messages</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link href="/css/wicketads.css" rel="stylesheet"/>
    <style>
        body { overflow: hidden; }
        .chat-layout { display: flex; height: calc(100vh - 56px); }
    </style>
</head>
<body>

<nav class="wa-nav">
    <a class="wa-nav__brand" href="/"><i class="bi bi-grid-3x3-gap-fill"></i> WicketAds</a>
    <div class="wa-nav__links">
        <a href="/" class="btn btn-outline btn-sm"><i class="bi bi-house"></i> Home</a>
        <a href="/profile" class="btn btn-outline btn-sm"><i class="bi bi-person-circle"></i> Profile</a>
        <a href="/logout" class="btn btn-danger btn-sm"><i class="bi bi-box-arrow-right"></i> Logout</a>
    </div>
</nav>

<div class="chat-layout">

    <!-- Conversation list -->
    <div class="chat-sidebar">
        <div class="chat-sidebar__header">
            <i class="bi bi-chat-dots"></i> Conversations
        </div>
        <div class="chat-conv-list">
            <div wicket:id="conversations">
                <a wicket:id="convLink" class="chat-conv-item">
                    <strong wicket:id="otherUsername"></strong>
                    <small wicket:id="adInfo"></small>
                </a>
            </div>
        </div>
    </div>

    <!-- Message thread -->
    <div class="chat-main">
        <div class="chat-thread">
            <div wicket:id="noConversation" class="chat-empty">
                <div>
                    <i class="bi bi-chat-square-dots" style="font-size:2rem; display:block; margin-bottom:.5rem; color:var(--clr-border);"></i>
                    Select a conversation to start chatting
                </div>
            </div>

            <div wicket:id="messages" class="chat-bubble">
                <div class="chat-bubble__meta">
                    <span class="chat-bubble__sender" wicket:id="senderUsername"></span>
                    <span class="chat-bubble__time" wicket:id="sentAt"></span>
                </div>
                <!-- VULNERABILITY: XSS – body rendered without HTML escaping -->
                <div class="chat-bubble__body" wicket:id="body"></div>
            </div>
        </div>

        <form wicket:id="sendForm" class="chat-input-bar">
            <textarea wicket:id="messageBody" class="form-control"
                      placeholder="Type a message…" rows="2"></textarea>
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-send"></i>
            </button>
        </form>
    </div>

</div>

</body>
</html>
