<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">
<head>
    <meta charset="UTF-8"/>
    <title>WicketAds - Post Ad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/">WicketAds</a>
        <div>
            <a href="/" class="btn btn-outline-light btn-sm me-2">Home</a>
            <a href="/logout" class="btn btn-outline-danger btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container" style="max-width:640px;">
    <h2 class="mb-4">Post New Ad</h2>

    <div wicket:id="feedback" class="mb-3"></div>

    <form wicket:id="form">
        <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" wicket:id="title" class="form-control"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea wicket:id="description" class="form-control" rows="5"></textarea>
        </div>
        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Price ($)</label>
                <input type="text" wicket:id="price" class="form-control"/>
            </div>
            <div class="col-md-6">
                <label class="form-label">Category</label>
                <select wicket:id="category" class="form-select"></select>
            </div>
        </div>
        <button type="submit" class="btn btn-success">Post Ad</button>
    </form>
</div>
</body>
</html>
