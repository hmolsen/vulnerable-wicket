<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>WicketAds – Classified Ads</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link href="/css/wicketads.css" rel="stylesheet"/>
</head>
<body>

<nav class="wa-nav">
    <a class="wa-nav__brand" href="/"><i class="bi bi-grid-3x3-gap-fill"></i> WicketAds</a>
    <div class="wa-nav__links">
        <span wicket:id="guestNav">
            <a wicket:id="loginLink" class="btn btn-outline btn-sm">
                <i class="bi bi-box-arrow-in-right"></i> Login
            </a>
            <a wicket:id="registerLink" class="btn btn-primary btn-sm">
                <i class="bi bi-person-plus"></i> Register
            </a>
        </span>
        <span wicket:id="userNav" class="d-flex align-center gap-1">
            <span class="wa-nav__welcome">Welcome, <strong><span wicket:id="welcomeUser"></span></strong></span>
            <a wicket:id="postAdLink" class="btn btn-success btn-sm"><i class="bi bi-plus-circle"></i> Post Ad</a>
            <a wicket:id="chatLink"   class="btn btn-outline btn-sm"><i class="bi bi-chat-dots"></i> Messages</a>
            <a wicket:id="profileLink" class="btn btn-outline btn-sm"><i class="bi bi-person-circle"></i> Profile</a>
            <a wicket:id="logoutLink"  class="btn btn-danger btn-sm"><i class="bi bi-box-arrow-right"></i> Logout</a>
        </span>
        <span wicket:id="adminNav">
            <a wicket:id="adminUsersLink" class="btn btn-admin btn-sm"><i class="bi bi-shield-lock"></i> Admin</a>
        </span>
    </div>
</nav>

<section class="wa-hero">
    <h1><i class="bi bi-search"></i> Find Your Next Deal</h1>
    <p>Thousands of classified ads – buy, sell, discover.</p>

    <form wicket:id="searchForm" class="wa-search-bar">
        <input type="text" wicket:id="keyword" class="form-control" placeholder="Search ads…"/>
        <select wicket:id="category" class="form-select" style="max-width:200px;">
            <option value="">All Categories</option>
        </select>
        <button type="submit" class="btn btn-primary">
            <i class="bi bi-search"></i> Search
        </button>
    </form>
</section>

<div class="container page-content">
    <div class="ad-grid" wicket:id="adList">
        <div class="ad-card">
            <div>
                <span class="badge badge-secondary" wicket:id="category"></span>
            </div>
            <div class="ad-card__title">
                <a wicket:id="adLink"><span wicket:id="title"></span></a>
            </div>
            <div class="ad-card__price" wicket:id="price"></div>
            <div class="ad-card__meta">
                <i class="bi bi-person"></i> <span wicket:id="owner"></span>
            </div>
        </div>
    </div>

    <div wicket:id="noAds" class="empty-state">
        <i class="bi bi-inbox"></i>
        No ads found matching your search.
    </div>
</div>

</body>
</html>
