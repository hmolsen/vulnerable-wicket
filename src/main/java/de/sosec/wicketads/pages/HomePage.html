<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">
<head>
    <meta charset="UTF-8"/>
    <title>WicketAds - Classified Ads</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/">WicketAds</a>
        <div class="d-flex gap-2 align-items-center">
            <span wicket:id="guestNav">
                <a wicket:id="loginLink" class="btn btn-outline-light btn-sm">Login</a>
                <a wicket:id="registerLink" class="btn btn-outline-light btn-sm">Register</a>
            </span>
            <span wicket:id="userNav">
                Welcome, <strong><span wicket:id="welcomeUser"></span></strong>
                &nbsp;
                <a wicket:id="postAdLink" class="btn btn-success btn-sm">Post Ad</a>
                <a wicket:id="chatLink" class="btn btn-outline-light btn-sm">Messages</a>
                <a wicket:id="profileLink" class="btn btn-outline-light btn-sm">Profile</a>
                <a wicket:id="logoutLink" class="btn btn-outline-danger btn-sm">Logout</a>
            </span>
            <span wicket:id="adminNav">
                <a wicket:id="adminUsersLink" class="btn btn-warning btn-sm">Admin: Users</a>
            </span>
        </div>
    </div>
</nav>

<div class="container">
    <h2 class="mb-3">Browse Ads</h2>

    <form wicket:id="searchForm" class="row g-2 mb-4">
        <div class="col-md-6">
            <input type="text" wicket:id="keyword" class="form-control" placeholder="Search keyword..."/>
        </div>
        <div class="col-md-4">
            <select wicket:id="category" class="form-select">
                <option value="">All Categories</option>
            </select>
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-primary w-100">Search</button>
        </div>
    </form>

    <div class="row row-cols-1 row-cols-md-3 g-4">
        <div class="col" wicket:id="adList">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">
                        <a wicket:id="adLink" class="text-decoration-none">
                            <span wicket:id="title"></span>
                        </a>
                    </h5>
                    <span class="badge bg-secondary" wicket:id="category"></span>
                    <p class="card-text mt-2 fw-bold text-success" wicket:id="price"></p>
                    <small class="text-muted">Posted by <span wicket:id="owner"></span></small>
                </div>
            </div>
        </div>
    </div>

    <div wicket:id="noAds" class="alert alert-info mt-4">No ads found.</div>
</div>
</body>
</html>
