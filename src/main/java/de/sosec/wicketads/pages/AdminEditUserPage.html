<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">
<head>
    <meta charset="UTF-8"/>
    <title>WicketAds - Admin: Edit User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/">WicketAds</a>
        <span class="badge bg-warning text-dark ms-2">ADMIN</span>
        <div>
            <a href="/admin/users" class="btn btn-outline-light btn-sm me-2">Back to Users</a>
            <a href="/logout" class="btn btn-outline-danger btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container" style="max-width:640px;">
    <h3 class="mb-4">Edit User</h3>

    <div wicket:id="feedback" class="mb-3"></div>

    <form wicket:id="form">
        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Username</label>
                <input type="text" wicket:id="username" class="form-control"/>
            </div>
            <div class="col-md-6">
                <label class="form-label">Password</label>
                <input type="text" wicket:id="password" class="form-control"/>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Role</label>
            <select wicket:id="role" class="form-select"></select>
        </div>
        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" wicket:id="fullName" class="form-control"/>
        </div>
        <div class="row mb-3">
            <div class="col-md-8">
                <label class="form-label">Street</label>
                <input type="text" wicket:id="street" class="form-control"/>
            </div>
            <div class="col-md-4">
                <label class="form-label">House Number</label>
                <input type="text" wicket:id="houseNumber" class="form-control"/>
            </div>
        </div>
        <div class="row mb-3">
            <div class="col-md-4">
                <label class="form-label">ZIP Code</label>
                <input type="text" wicket:id="zipCode" class="form-control"/>
            </div>
            <div class="col-md-4">
                <label class="form-label">City</label>
                <input type="text" wicket:id="city" class="form-control"/>
            </div>
            <div class="col-md-4">
                <label class="form-label">Country</label>
                <input type="text" wicket:id="country" class="form-control"/>
            </div>
        </div>
        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Phone</label>
                <input type="text" wicket:id="phone" class="form-control"/>
            </div>
            <div class="col-md-6">
                <label class="form-label">Email</label>
                <input type="text" wicket:id="email" class="form-control"/>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="/admin/users" class="btn btn-secondary ms-2">Cancel</a>
    </form>
</div>
</body>
</html>
