<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">
<head>
    <meta charset="UTF-8"/>
    <title>WicketAds - Admin: Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/">WicketAds</a>
        <span class="badge bg-warning text-dark ms-2">ADMIN</span>
        <div>
            <a href="/" class="btn btn-outline-light btn-sm me-2">Home</a>
            <a href="/logout" class="btn btn-outline-danger btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container-fluid px-4">
    <h3 class="mb-4">User Management</h3>

    <div class="table-responsive">
        <table class="table table-bordered table-hover table-sm">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Password</th>
                    <th>Role</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr wicket:id="userList">
                    <td wicket:id="userId"></td>
                    <td wicket:id="username"></td>
                    <!-- VULNERABILITY: plain-text password displayed -->
                    <td wicket:id="password" class="text-danger fw-bold"></td>
                    <td wicket:id="role"></td>
                    <td wicket:id="email"></td>
                    <td wicket:id="phone"></td>
                    <td>
                        <a wicket:id="editLink" class="btn btn-sm btn-primary me-1">Edit</a>
                        <a wicket:id="deleteLink" class="btn btn-sm btn-danger"
                           onclick="return confirm('Delete this user and all their data?')">Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
