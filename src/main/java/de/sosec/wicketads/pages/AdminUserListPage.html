<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>WicketAds &ndash; Admin: Users</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link href="/css/wicketads.css" rel="stylesheet"/>
</head>
<body>

<nav class="wa-nav">
    <a class="wa-nav__brand" href="/"><i class="bi bi-grid-3x3-gap-fill"></i> WicketAds</a>
    <div class="wa-nav__links">
        <a href="/" class="btn btn-outline btn-sm"><i class="bi bi-house"></i> Home</a>
        <a href="/logout" class="btn btn-danger btn-sm"><i class="bi bi-box-arrow-right"></i> Logout</a>
    </div>
</nav>

<div class="admin-header">
    <i class="bi bi-shield-lock-fill"></i> Admin Panel &ndash; User Management
</div>

<div class="container page-content">

    <div class="wa-card">
        <div class="wa-card__header">
            <div style="display:flex; align-items:center; gap:.5rem;">
                <i class="bi bi-people-fill" style="color:var(--clr-admin);"></i>
                <span style="font-weight:700;">Registered Users</span>
                <span class="badge badge-admin">SENSITIVE DATA EXPOSED</span>
            </div>
        </div>
        <div style="overflow-x:auto;">
            <table class="wa-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th><i class="bi bi-exclamation-triangle-fill" style="color:#fbbf24;"></i> Password (plain)</th>
                        <th>Role</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr wicket:id="userList">
                        <td wicket:id="userId" style="color:var(--clr-muted); font-size:.8rem;"></td>
                        <td><strong wicket:id="username"></strong></td>
                        <!-- VULNERABILITY: plain-text password displayed -->
                        <td class="td-pw" wicket:id="password"></td>
                        <td>
                            <span class="badge badge-secondary" wicket:id="role"></span>
                        </td>
                        <td wicket:id="email"></td>
                        <td wicket:id="phone"></td>
                        <td style="white-space:nowrap;">
                            <a wicket:id="editLink" class="btn btn-primary btn-sm">
                                <i class="bi bi-pencil"></i> Edit
                            </a>
                            <a wicket:id="deleteLink" class="btn btn-danger btn-sm"
                               onclick="return confirm('Delete this user and all their data?')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

</body>
</html>
