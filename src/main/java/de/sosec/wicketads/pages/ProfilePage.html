<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>WicketAds &ndash; Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link href="/css/wicketads.css" rel="stylesheet"/>
</head>
<body>

<nav class="wa-nav">
    <a class="wa-nav__brand" href="/"><i class="bi bi-grid-3x3-gap-fill"></i> WicketAds</a>
    <div class="wa-nav__links">
        <a href="/" class="btn btn-outline btn-sm"><i class="bi bi-house"></i> Home</a>
        <a href="/logout" class="btn btn-danger btn-sm"><i class="bi bi-box-arrow-right"></i> Logout</a>
    </div>
</nav>

<div class="container-sm page-content">

    <div class="wa-card">
        <div class="wa-card__header">
            <h2 style="font-size:1.2rem; font-weight:700; display:flex; align-items:center; gap:.5rem;">
                <i class="bi bi-person-circle" style="color:var(--clr-primary);"></i> Edit Profile
            </h2>
        </div>
        <div class="wa-card__body">
            <div wicket:id="feedback" class="feedback-panel mb-2"></div>

            <form wicket:id="form">
                <!-- VULNERABILITY: hidden userId field can be tampered via devtools -->
                <input type="hidden" wicket:id="userId"/>

                <div class="section-header">
                    <i class="bi bi-person-badge"></i> Account
                </div>
                <div class="row row-2">
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" wicket:id="username" class="form-control"/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="text" wicket:id="password" class="form-control"/>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" wicket:id="fullName" class="form-control"/>
                </div>

                <div class="section-header">
                    <i class="bi bi-geo-alt"></i> Address
                </div>
                <div class="row row-34">
                    <div class="form-group">
                        <label class="form-label">Street</label>
                        <input type="text" wicket:id="street" class="form-control"/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">House No.</label>
                        <input type="text" wicket:id="houseNumber" class="form-control"/>
                    </div>
                </div>
                <div class="row row-3">
                    <div class="form-group">
                        <label class="form-label">ZIP Code</label>
                        <input type="text" wicket:id="zipCode" class="form-control"/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">City</label>
                        <input type="text" wicket:id="city" class="form-control"/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Country</label>
                        <input type="text" wicket:id="country" class="form-control"/>
                    </div>
                </div>

                <div class="section-header">
                    <i class="bi bi-telephone"></i> Contact
                </div>
                <div class="row row-2">
                    <div class="form-group">
                        <label class="form-label">Phone</label>
                        <input type="text" wicket:id="phone" class="form-control"/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="text" wicket:id="email" class="form-control"/>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary mt-2">
                    <i class="bi bi-check-lg"></i> Save Profile
                </button>
            </form>
        </div>
    </div>

</div>

</body>
</html>
