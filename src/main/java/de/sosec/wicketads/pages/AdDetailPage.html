<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>WicketAds &ndash; Ad Detail</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link href="/css/wicketads.css" rel="stylesheet"/>
</head>
<body>

<nav class="wa-nav">
    <a class="wa-nav__brand" href="/"><i class="bi bi-grid-3x3-gap-fill"></i> WicketAds</a>
    <div class="wa-nav__links">
        <a href="/" class="btn btn-outline btn-sm"><i class="bi bi-arrow-left"></i> Back to Listings</a>
    </div>
</nav>

<div class="container page-content">
    <div class="ad-detail-wrap">

        <!-- Main content -->
        <div class="wa-card">
            <div class="wa-card__body">
                <span class="badge badge-primary mb-2" wicket:id="category"></span>
                <h1 class="ad-detail-title" wicket:id="title"></h1>
                <div class="ad-detail-price" wicket:id="price"></div>

                <hr style="border-color:var(--clr-border); margin:1.25rem 0;"/>

                <!-- VULNERABILITY: XSS &ndash; description rendered without HTML escaping -->
                <div class="ad-detail-description" wicket:id="description"></div>
            </div>
        </div>

        <!-- Sidebar meta card -->
        <aside>
            <div class="ad-meta-card">
                <div class="ad-meta-row">
                    <i class="bi bi-person-circle"></i>
                    <div>
                        <div class="ad-meta-label">Seller</div>
                        <div class="ad-meta-value" wicket:id="owner"></div>
                    </div>
                </div>
                <div class="ad-meta-row">
                    <i class="bi bi-calendar3"></i>
                    <div>
                        <div class="ad-meta-label">Posted</div>
                        <div class="ad-meta-value" wicket:id="createdAt"></div>
                    </div>
                </div>

            </div>

            <div wicket:id="contactContainer" class="mt-2">
                <a wicket:id="contactLink" class="btn btn-primary btn-lg btn-block">
                    <i class="bi bi-chat-dots"></i> Contact Seller
                </a>
            </div>

            <a href="/" class="btn btn-secondary btn-block mt-1">
                <i class="bi bi-arrow-left"></i> Back to Listings
            </a>
        </aside>

    </div>
</div>

</body>
</html>
