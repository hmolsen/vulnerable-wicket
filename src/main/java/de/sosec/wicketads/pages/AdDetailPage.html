<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">
<head>
    <meta charset="UTF-8"/>
    <title>WicketAds - Ad Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/">WicketAds</a>
        <div>
            <a href="/" class="btn btn-outline-light btn-sm">Home</a>
        </div>
    </div>
</nav>

<div class="container" style="max-width:800px;">
    <div class="card shadow-sm">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h3 class="mb-0" wicket:id="title"></h3>
            <span class="badge bg-secondary" wicket:id="category"></span>
        </div>
        <div class="card-body">
            <h4 class="text-success mb-3" wicket:id="price"></h4>

            <!-- VULNERABILITY: XSS - description rendered without HTML escaping -->
            <div class="mb-4" wicket:id="description"></div>

            <hr/>
            <p class="text-muted mb-1">Posted by: <strong wicket:id="owner"></strong></p>
            <p class="text-muted mb-3">Date: <span wicket:id="createdAt"></span></p>

            <div wicket:id="contactContainer">
                <a wicket:id="contactLink" class="btn btn-primary">Contact Seller</a>
            </div>
        </div>
    </div>

    <a href="/" class="btn btn-secondary mt-3">Back to Listings</a>
</div>
</body>
</html>
