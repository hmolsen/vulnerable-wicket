<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>WicketAds – Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link href="/css/wicketads.css" rel="stylesheet"/>
</head>
<body>

<nav class="wa-nav">
    <a class="wa-nav__brand" href="/"><i class="bi bi-grid-3x3-gap-fill"></i> WicketAds</a>
    <div class="wa-nav__links">
        <a href="/" class="btn btn-outline btn-sm"><i class="bi bi-house"></i> Home</a>
        <a href="/login" class="btn btn-outline btn-sm"><i class="bi bi-box-arrow-in-right"></i> Login</a>
    </div>
</nav>

<div class="wa-auth-wrap">
    <div class="wa-auth-card">
        <div class="wa-auth-card__header">
            <i class="bi bi-person-plus" style="font-size:2rem; color:var(--clr-primary);"></i>
            <h2 class="mt-1">Create Account</h2>
            <p>Join WicketAds and start posting today</p>
        </div>
        <div class="wa-auth-card__body">
            <div wicket:id="feedback" class="feedback-panel mb-2"></div>

            <form wicket:id="form">
                <div class="form-group">
                    <label class="form-label"><i class="bi bi-person"></i> Username</label>
                    <input type="text" wicket:id="username" class="form-control" autocomplete="username"/>
                </div>
                <div class="form-group">
                    <label class="form-label"><i class="bi bi-lock"></i> Password</label>
                    <input type="text" wicket:id="password" class="form-control" autocomplete="new-password"/>
                </div>
                <div class="form-group">
                    <label class="form-label"><i class="bi bi-lock-fill"></i> Confirm Password</label>
                    <input type="text" wicket:id="confirmPassword" class="form-control" autocomplete="new-password"/>
                </div>
                <button type="submit" class="btn btn-primary btn-lg btn-block mt-2">
                    <i class="bi bi-person-check"></i> Create Account
                </button>
            </form>
        </div>
        <div class="wa-auth-card__footer">
            Already have an account? <a href="/login">Sign in</a>
        </div>
    </div>
</div>

</body>
</html>
