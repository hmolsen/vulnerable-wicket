<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">
<head>
    <meta charset="UTF-8"/>
    <title>WicketAds - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/">WicketAds</a>
        <div>
            <a href="/login" class="btn btn-outline-light btn-sm me-2">Login</a>
            <a href="/" class="btn btn-outline-light btn-sm">Home</a>
        </div>
    </div>
</nav>

<div class="container" style="max-width:480px;">
    <h2 class="mb-4">Create Account</h2>

    <div wicket:id="feedback" class="mb-3"></div>

    <form wicket:id="form">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" wicket:id="username" class="form-control"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="text" wicket:id="password" class="form-control"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input type="text" wicket:id="confirmPassword" class="form-control"/>
        </div>
        <button type="submit" class="btn btn-primary w-100">Register</button>
    </form>

    <p class="mt-3 text-center">Already have an account? <a href="/login">Login</a></p>
</div>
</body>
</html>
